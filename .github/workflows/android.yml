# Author: Kang Lin <kl222@126.com>

name: android

on:
  workflow_call:
    outputs:
      name:
        description: "The artifact name"
        value: ${{ jobs.build_android.outputs.name }}

jobs:
  build_android:

    strategy:
      matrix:
        include:
          - qt_arch: android_arm64_v8a
            VCPKG_TARGET_TRIPLET: arm64-android
            ANDROID_ABI: arm64-v8a
            arch: arm64
            qt_version: 6.11.1
            BUILD_TYPE: Release

          - qt_arch: android_x86_64
            VCPKG_TARGET_TRIPLET: x64-android
            ANDROID_ABI: x86_64
            arch: x86_64
            qt_version: 6.11.1
            BUILD_TYPE: Release

          - qt_arch: android_arm64_v8a
            VCPKG_TARGET_TRIPLET: arm64-android
            ANDROID_ABI: arm64-v8a
            arch: arm64
            qt_version: 6.10.3
            BUILD_TYPE: Release

          - qt_arch: android_x86_64
            VCPKG_TARGET_TRIPLET: x64-android
            ANDROID_ABI: x86_64
            arch: x86_64
            qt_version: 6.10.3
            BUILD_TYPE: Release

    # See: [About GitHub-hosted runners](https://docs.github.com/actions/using-github-hosted-runners/about-github-hosted-runners/about-github-hosted-runners)
    # See: [Choosing the runner for a job](https://docs.github.com/actions/writing-workflows/choosing-where-your-workflow-runs/choosing-the-runner-for-a-job)
    # See: https://github.com/actions/runner-images/
    runs-on: ubuntu-24.04

    env:
      RabbitProxyServer_VERSION: v0.0.25
      VCPKGGITCOMMITID: 7213cf8135c329c37c7e2778e40774489a0583a8
      VCPKG_TARGET_TRIPLET: ${{matrix.VCPKG_TARGET_TRIPLET}}
      VCPKG_DEFAULT_TRIPLET: ${{matrix.VCPKG_TARGET_TRIPLET}}
      VCPKG_DEFAULT_HOST_TRIPLET: x64-linux
      VCPKG_MANIFEST_FEATURES: "freerdp;vnc;wol;filetransfer;${{matrix.VCPKG_MANIFEST_FEATURES}}"
      BUILD_DIR:     ${{github.workspace}}/build
      SOURCE_DIR:    ${{github.workspace}}/.cache/source
      TOOLS_DIR:     ${{github.workspace}}/.cache/tools
      INSTALL_DIR:   ${{github.workspace}}/.cache/install
      artifact_name: build_android
      #ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/26.3.11579264
      ANDROID_PLATFORM: android-34
      ANDROID_NATIVE_API_LEVEL: 34
      ANDROID_ABI: ${{matrix.ANDROID_ABI}}
      qt_modules: 'qtimageformats qtmultimedia qtscxml'

    # Map the job outputs to step outputs
    outputs:
      name: ${{ env.artifact_name }}

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: make directory
        run: |
          cmake -E make_directory ${{env.SOURCE_DIR}}
          cmake -E make_directory ${{env.TOOLS_DIR}}
          cmake -E make_directory ${{env.INSTALL_DIR}}
          cmake -E make_directory ${{env.BUILD_DIR}}

      - name: Install apt packages
        run: |
          #sudo apt-get update -y
          #sudo apt-get upgrade -y
          sudo apt install -y -q ninja-build nasm

      - name: Cache installed
        uses: actions/cache@v5
        id: cache-installed
        with:
          path: |
            ${{env.INSTALL_DIR}}
          key: install_android_qt${{matrix.qt_version}}_${{matrix.qt_arch}}_${{matrix.BUILD_TYPE}}

      - name: run-vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{env.VCPKGGITCOMMITID}}
          vcpkgDirectory: ${{env.SOURCE_DIR}}/vcpkg

      - name: Install Qt of linux_gcc_64
        uses: jurplel/install-qt-action@v4
        with:
          dir: '${{env.TOOLS_DIR}}/qt' # optional
          version: '${{matrix.qt_version}}'
          #host: 'linux'
          target: 'desktop'
          arch: 'linux_gcc_64'
          set-env: false
          cache: true
          cache-key-prefix: cached-qt_${{matrix.qt_version}}_${{matrix.qt_arch}}

      - name: Install Qt of android
        uses: jurplel/install-qt-action@v4
        with:
          # Directory to install Qt
          dir: '${{env.TOOLS_DIR}}/qt' # optional
          # Version of Qt to install
          version: '${{matrix.qt_version}}'
          # Host platform
          #host: linux # optional
          # Target platform for build
          target: 'android' # optional, default is desktop
          # Architecture for Windows/Android
          arch: '${{matrix.qt_arch}}' # optional
          # Additional Qt modules to install
          modules: '${{env.qt_modules}}' # optional. See: https://ddalcino.github.io/aqt-list-server/
          cache: true
          cache-key-prefix: cached-qt_${{matrix.qt_version}}_${{matrix.qt_arch}}

      - name: chmod qt-cmake
        run: |
          sudo chmod 777 ${QT_ROOT_DIR}/bin/qt-cmake
          # 清理 resConfig
          find ${QT_ROOT_DIR} -path "*/templates/build.gradle" -type f | while read file; do
              echo "Fixing: $file"
              sed -i 's/resConfig "en"//g' "$file"
          done

      - name: build qxmpp
        working-directory: ${{env.SOURCE_DIR}}
        env:
          QT_ROOT: ${{env.QT_ROOT_DIR}}
        run: |
          if [ ! -d ${{env.INSTALL_DIR}}/lib/cmake/qxmpp ]; then
            git clone -b v1.2.1 "https://github.com/qxmpp-project/qxmpp.git"
            cd qxmpp
            cmake -E make_directory build
            cd build
            cmake .. -DBUILD_EXAMPLES=OFF -DBUILD_TESTS=OFF \
                -DCMAKE_BUILD_TYPE=${{matrix.BUILD_TYPE}} \
                -DQt5_DIR=${{env.QT_ROOT}}/lib/cmake/Qt5 \
                -DQt5Core_DIR=${{env.QT_ROOT}}/lib/cmake/Qt5Core \
                -DQt5Gui_DIR=${{env.QT_ROOT}}/lib/cmake/Qt5Gui \
                -DQt5Test_DIR=${{env.QT_ROOT}}/lib/cmake/Qt5Test \
                -DQt5Xml_DIR=${{env.QT_ROOT}}/lib/cmake/Qt5Xml \
                -DQt5Network_DIR=${{env.QT_ROOT}}/lib/cmake/Qt5Network \
                -DCMAKE_INSTALL_PREFIX=${{env.INSTALL_DIR}} \
                -DCMAKE_PREFIX_PATH=${{env.QT_ROOT}} \
                -DCMAKE_TOOLCHAIN_FILE=${{env.VCPKG_ROOT}}/scripts/buildsystems/vcpkg.cmake \
                -DVCPKG_CHAINLOAD_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
                -DANDROID_ABI=${{matrix.ANDROID_ABI}} \
                -DANDROID_PLATFORM=${{matrix.ANDROID_PLATFORM}}
            cmake --build . --config ${{matrix.BUILD_TYPE}}
            cmake --build . --config ${{matrix.BUILD_TYPE}} --target install/strip
          fi

      - name: git clone RabbitCommon
        working-directory: ${{env.SOURCE_DIR}}
        run: git clone https://github.com/KangLin/RabbitCommon.git

      - name: build RabbitProxyServer
        working-directory: ${{github.workspace}}/build
        env:
          RabbitCommon_DIR: ${{env.SOURCE_DIR}}/RabbitCommon
          QT_ROOT: ${{env.QT_ROOT_DIR}}
          STOREPASS: ${{secrets.STOREPASS}}
        run: |
          sudo chmod 777 ${Qt6_DIR}/bin/qt-cmake
          ${Qt6_DIR}/bin/qt-cmake ${{github.workspace}} \
            -DCMARK_SHARED=OFF \
            -DCMARK_TESTS=OFF \
            -DCMARK_STATIC=ON \
            -DBUILD_FREERDP=ON \
            -DQXmpp_DIR=${{env.INSTALL_DIR}}/lib/cmake/qxmpp \
            -DCMAKE_BUILD_TYPE=${{matrix.BUILD_TYPE}} \
            -DCMAKE_INSTALL_PREFIX=${{env.INSTALL_DIR}} \
            -DANDROID_ABI=${{matrix.ANDROID_ABI}} \
            -DANDROID_PLATFORM=${{matrix.ANDROID_PLATFORM}} \
            -DQt6LinguistTools_DIR=${Qt6_DIR}/../gcc_64/lib/cmake/Qt6LinguistTools
          cmake --build . --config ${{matrix.BUILD_TYPE}}  --target all
          APK_FILE=`find . -name "android-*.apk"`
          cp $APK_FILE RabbitProxyServer_${{env.Calendar_VERSION}}_${{matrix.qt_arch}}_qt${{matrix.qt_version}}_${{matrix.BUILD_TYPE}}.apk

      - name: Update artifact
        #if: ${{ matrix.BUILD_TYPE == 'Release' }}
        uses: actions/upload-artifact@v3
        with:
          name: ${{ env.artifact_name }}
          path: |
            ${{github.workspace}}/build/RabbitProxyServer_${{env.Calendar_VERSION}}_${{matrix.qt_arch}}_qt${{matrix.qt_version}}_${{matrix.BUILD_TYPE}}.apk
